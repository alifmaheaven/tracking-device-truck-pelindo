# Nginx config for ptt.teluklamong.co.id
# M01 — Subdomain migration (Opsi B: Nginx, path-based)
#
# DEPLOY INSTRUKSI:
# 1. Copy file ini ke /etc/nginx/sites-available/ptt.teluklamong.co.id
# 2. Symlink: ln -s /etc/nginx/sites-available/ptt.teluklamong.co.id /etc/nginx/sites-enabled/
# 3. Cert TLS via certbot:
#      certbot --nginx -d ptt.teluklamong.co.id
#    (atau paste cert manual di blok 443 jika cert sudah ada)
# 4. Test: nginx -t
# 5. Reload: systemctl reload nginx
# 6. Verifikasi:
#      curl -I https://ptt.teluklamong.co.id/api/captcha
#      wscat -c wss://ptt.teluklamong.co.id/ws

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name ptt.teluklamong.co.id;
    return 301 https://$host$request_uri;
}

# HTTPS utama (443) — frontend + API
server {
    listen 443 ssl;
    http2 on;
    server_name ptt.teluklamong.co.id;

    # TLS certs (Let's Encrypt / certbot akan isi otomatis)
    ssl_certificate /etc/letsencrypt/live/ptt.teluklamong.co.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ptt.teluklamong.co.id/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    # API + Captcha (forward ke backend container port 9090)
    location /api/ {
        proxy_pass http://127.0.0.1:9090/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    # N8N webhook (untuk coordinate + history endpoint di backend)
    # Backend mem-proxy ke internal n8n container (lihat backend/server.js:74)
    # Client tdk perlu akses n8n langsung; semua lewat /webhook/ di backend.
    location /webhook/ {
        proxy_pass http://127.0.0.1:9090/webhook/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend static (proxy ke frontend container port 80)
    location / {
        proxy_pass http://127.0.0.1:80/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# WebSocket di port 9090 (per instruksi M01: ptt.teluklamong.co.id:9090)
# Dedicated listener karena PTT butuh long-lived, dan eksplisit port 9090.
# Cert TLS SAN harus include ptt.teluklamong.co.id (certbot --nginx -d ptt.teluklamong.co.id sudah cover).
server {
    listen 9090 ssl;
    http2 on;
    server_name ptt.teluklamong.co.id;

    ssl_certificate /etc/letsencrypt/live/ptt.teluklamong.co.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ptt.teluklamong.co.id/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # WebSocket endpoint di /ws
    location / {
        proxy_pass http://127.0.0.1:9090/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # PTT butuh long-lived connection
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
