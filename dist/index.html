<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Meta Data Standar SEO -->
    <meta name="description" content="Dashboard pemantauan dan pelacakan posisi truk secara real-time di area operasional PT Terminal Teluk Lamong, Surabaya.">
    <meta name="keywords" content="Tracking Truck, Teluk Lamong, Pelindo, Terminal Petikemas Surabaya, GPS Tracking, Posisi Truk, Real-time Tracker">
    <meta name="author" content="PT Prakhya Tama Cakrawala">
    
    <!-- Open Graph (Facebook, WA, LinkedIn) -->
    <meta property="og:title" content="Tracking Truck - PT. Terminal Petikemas Surabaya">
    <meta property="og:description" content="Pantau pergerakan dan posisi truk secara real-time di Terminal Teluk Lamong.">
    <meta property="og:image" content="https://www.teluklamong.co.id/images/logo.png">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="id_ID">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Tracking Truck - PT. Terminal Petikemas Surabaya">
    <meta name="twitter:description" content="Dashboard pemantauan dan pelacakan posisi truk secara real-time di area operasional PT Terminal Teluk Lamong.">
    
    <title>Tracking Truck - PT. Terminal Petikemas Surabaya</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icons (FontAwesome) -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <link rel="icon" href="https://www.teluklamong.co.id/images/favicon.png">
  <script type="module" crossorigin src="/assets/index-CSWvwWgp.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-e6Dw3Bcl.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Kiri -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2><i class="fa-solid fa-truck-fast"></i> Device Tracker</h2>
                <p>Tracking Posisi Truck Teluk Lamong</p>
            </div>
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchInput" placeholder="Cari Truk / Device ID...">
            </div>
            <div class="device-list" id="deviceList">
                <!-- Data device akan di-generate oleh javascript -->
            </div>
            
            <!-- Total Device Floating Footer -->
            <div class="total-device-footer" id="totalDeviceFooter">
                <i class="fa-solid fa-truck"></i> Total Device: <span id="totalDeviceCount">0</span>
            </div>
        </aside>
        
        <!-- Maps Kanan -->
        <main class="map-container">
            <div class="floating-logo">
                <img src="https://www.teluklamong.co.id/images/logo.png" alt="Teluk Lamong Logo">
            </div>
            
            <!-- Floating Refresh Counter & Selector -->
            <div class="refresh-container">
                <div class="refresh-options" id="refreshOptions">
                    <button class="time-btn" data-time="5">5s</button>
                    <button class="time-btn" data-time="10">10s</button>
                    <button class="time-btn" data-time="15">15s</button>
                </div>
                <div class="floating-refresh" id="floatingRefreshBtn" title="Pengaturan Interval Pembaruan">
                    <svg viewBox="0 0 36 36" class="circular-chart">
                        <path class="circle-bg" stroke-dasharray="100, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                        <path class="circle" id="refreshCircle" stroke-dasharray="100, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                    </svg>
                    <div class="refresh-text" id="refreshText">15</div>
                </div>
            </div>
            <button id="toggleSidebarBtn" class="toggle-btn" title="Toggle Sidebar">
                <i class="fa-solid fa-chevron-left"></i>
            </button>
            <div id="map"></div>
        </main>
    </div>

    <!-- History Modal -->
    <div id="historyModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fa-solid fa-route"></i> Riwayat Perjalanan Kendaraan</h3>
                <button id="closeHistoryModalBtn" class="close-btn"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-info" style="display: flex; flex-direction: column; gap: 10px; padding: 12px 20px; background-color: #f8fafc; border-bottom: 1px solid #e2e8f0; z-index: 10;">
                
                <!-- Filter Section -->
                <div class="history-filter" style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
                    <label style="font-size: 13px; font-weight: 600; color: #475569;"><i class="fa-solid fa-filter"></i> Filter Waktu:</label>
                    <select id="historyTimePreset" style="padding: 6px; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 13px;">
                        <option value="1day" selected>1 Hari Terakhir</option>
                        <option value="1week">1 Minggu Terakhir</option>
                        <option value="1month">1 Bulan Terakhir</option>
                        <option value="custom">Pilih Tanggal Manual</option>
                    </select>

                    <div id="customDateRange" style="display: none; gap: 8px; align-items: center; font-size: 13px;">
                        <input type="datetime-local" id="histStartDate" style="padding: 5px; border: 1px solid #cbd5e1; border-radius: 4px;">
                        <span>sampai</span>
                        <input type="datetime-local" id="histEndDate" style="padding: 5px; border: 1px solid #cbd5e1; border-radius: 4px;">
                    </div>

                    <button id="applyHistoryFilterBtn" style="padding: 6px 12px; background-color: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 500;"><i class="fa-solid fa-arrow-rotate-right"></i> Terapkan</button>
                </div>

                <!-- Distance Info -->
                <div id="distanceInfo" style="display:none; color: #334155; font-weight: 500; font-size: 14px;">
                    <i class="fa-solid fa-ruler-combined" style="color: #2563eb; margin-right: 5px;"></i> Total Jarak Tempuh: <span id="totalDistance" style="font-weight: 700; color: #0f172a;">-</span> km
                </div>
            </div>
            <div class="modal-body">
                <div id="loadingHistory" class="loading-state" style="display:none;">Sedang memuat data rute perjalanan...</div>
                <div id="historyMap"></div>
                <!-- Routing Toggle Container -->
                <div id="routingToggleContainer" class="routing-toggle-container">
                    <div style="font-size: 11px; color: #64748b; margin-bottom: 4px;">Mode Routing:</div>
                    <label class="routing-radio">
                        <input type="radio" name="routingMode" value="manual" checked> <i class="fa-solid fa-ruler"></i> Garis Lurus (Manual)
                    </label>
                    <label class="routing-radio">
                        <input type="radio" name="routingMode" value="osrm"> <i class="fa-solid fa-road"></i> Jalan Raya (OSRM)
                    </label>
                </div>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
</body>
</html>
