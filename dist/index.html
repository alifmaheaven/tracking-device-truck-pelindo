<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracking Truck Pelindo</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icons (FontAwesome) -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
  <script type="module" crossorigin src="/assets/index-DSnetgbh.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-l-45W9yY.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Kiri -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2><i class="fa-solid fa-truck-fast"></i> Device Tracker</h2>
                <p>Tracking Posisi Truck Teluk Lamong</p>
            </div>
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchInput" placeholder="Cari Truk / Device ID...">
            </div>
            <div class="device-list" id="deviceList">
                <!-- Data device akan di-generate oleh javascript -->
            </div>
        </aside>
        
        <!-- Maps Kanan -->
        <main class="map-container">
            <div class="floating-logo">
                <img src="https://www.teluklamong.co.id/images/logo.png" alt="Teluk Lamong Logo">
            </div>
            <button id="toggleSidebarBtn" class="toggle-btn" title="Toggle Sidebar">
                <i class="fa-solid fa-chevron-left"></i>
            </button>
            <div id="map"></div>
        </main>
    </div>

    <!-- History Modal -->
    <div id="historyModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fa-solid fa-route"></i> Riwayat Perjalanan Kendaraan</h3>
                <button id="closeHistoryModalBtn" class="close-btn"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-info" style="display: flex; flex-direction: column; gap: 10px; padding: 12px 20px; background-color: #f8fafc; border-bottom: 1px solid #e2e8f0; z-index: 10;">
                
                <!-- Filter Section -->
                <div class="history-filter" style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
                    <label style="font-size: 13px; font-weight: 600; color: #475569;"><i class="fa-solid fa-filter"></i> Filter Waktu:</label>
                    <select id="historyTimePreset" style="padding: 6px; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 13px;">
                        <option value="1day" selected>1 Hari Terakhir</option>
                        <option value="1week">1 Minggu Terakhir</option>
                        <option value="1month">1 Bulan Terakhir</option>
                        <option value="custom">Pilih Tanggal Manual</option>
                    </select>

                    <div id="customDateRange" style="display: none; gap: 8px; align-items: center; font-size: 13px;">
                        <input type="datetime-local" id="histStartDate" style="padding: 5px; border: 1px solid #cbd5e1; border-radius: 4px;">
                        <span>sampai</span>
                        <input type="datetime-local" id="histEndDate" style="padding: 5px; border: 1px solid #cbd5e1; border-radius: 4px;">
                    </div>

                    <button id="applyHistoryFilterBtn" style="padding: 6px 12px; background-color: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 500;"><i class="fa-solid fa-arrow-rotate-right"></i> Terapkan</button>
                </div>

                <!-- Distance Info -->
                <div id="distanceInfo" style="display:none; color: #334155; font-weight: 500; font-size: 14px;">
                    <i class="fa-solid fa-ruler-combined" style="color: #2563eb; margin-right: 5px;"></i> Total Jarak Tempuh: <span id="totalDistance" style="font-weight: 700; color: #0f172a;">-</span> km
                </div>
            </div>
            <div class="modal-body">
                <div id="loadingHistory" class="loading-state" style="display:none;">Sedang memuat data rute perjalanan...</div>
                <div id="historyMap"></div>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
</body>
</html>
